<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent chủ v1.09</title>
  <link rel="stylesheet" href="/styles.css?v=1.09.9" />
  </head>
  <body>
    <div class="app" data-theme="dark">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
          <button id="sidebarCloseBtn" class="icon-btn sidebar-close-btn" type="button" title="Đóng lịch sử chat" aria-label="Đóng lịch sử chat">×</button>
          <div class="brand">
            <div class="logo">M</div>
            <div>
              <div class="title">Agent chủ <span class="version-badge" data-app-version>v1.09</span></div>
              <div class="subtitle">PLR, SaaS, WarriorPlus</div>
            </div>
          </div>
          <nav id="workspaceTabs" class="workspace-tabs" aria-label="Chọn kênh chat">
            <a href="/1" data-workspace-tab="1">1</a>
            <a href="/2" data-workspace-tab="2">2</a>
            <a href="/3" data-workspace-tab="3">3</a>
          </nav>
          <button id="newChatBtn" class="new-chat-btn" type="button">+ Chat mới</button>
          <label class="search-box" title="Tìm trong lịch sử chat">
            <span>Tìm</span>
            <input id="threadSearch" type="search" placeholder="Tìm chủ đề..." autocomplete="off" />
          </label>
        </div>

        <div class="sidebar-section">
          <div class="section-label">Gần đây</div>
          <div id="threadList" class="thread-list"></div>
        </div>
        <div class="sidebar-bottom">
          <div class="user-profile">
            <div class="avatar">U</div>
            <div class="user-info">
              <div class="user-name">Người dùng</div>
              <div class="user-plan">PLR Agent</div>
            </div>
          </div>
        </div>
      </aside>
      <button id="sidebarBackdrop" class="sidebar-backdrop" type="button" aria-label="Đóng lịch sử chat"></button>

      <main class="main">
        <header class="topbar">
          <button id="sidebarToggleBtn" class="icon-btn sidebar-toggle" type="button" title="Ẩn/hiện lịch sử chat">☰</button>
          <div class="topbar-left">
            <div class="chat-title">Agent chủ <span id="workspaceBadge" class="workspace-badge"></span><span class="version-badge" data-app-version>v1.09</span></div>
            <div id="brainSummary" class="chat-subtitle">Đang kiểm tra 3 bộ não...</div>
            <div id="projectStateBar" class="project-state-bar" hidden>
              <span class="ps-label">Dự án:</span>
              <span id="psProjectName" class="ps-name">—</span>
              <span class="ps-sep">·</span>
              <span id="psReadiness" class="ps-readiness">0%</span>
              <span class="ps-sep">·</span>
              <span id="psNextAction" class="ps-next">—</span>
              <button id="psRefreshBtn" class="icon-btn" type="button" title="Refresh trạng thái dự án">↻</button>
            </div>
          </div>
          <div class="topbar-controls" aria-label="Cấu hình chat">
            <label>
              <span>Chế độ AI</span>
              <select id="modelSelect">
                <option value="agent">Agent chủ</option>
                <option value="planner">Planner sâu</option>
                <option value="creator">Dựng nội dung</option>
                <option value="critic">Phản biện launch</option>
              </select>
            </label>
            <label>
              <span>Công cụ</span>
              <select id="toolModeSelect">
                <option value="auto">Tự động</option>
                <option value="files">File/RAG</option>
                <option value="case">Case Study Brain</option>
                <option value="launch">Launch OS</option>
                <option value="none">Tắt</option>
              </select>
            </label>
          </div>
          <div class="topbar-actions">
            <button id="promptLibraryBtn" class="icon-btn" type="button" title="Mở thư viện prompt">⌘</button>
            <button id="statusBtn" class="icon-btn" type="button" title="Trạng thái bộ não">i</button>
            <button id="exportBtn" class="icon-btn" type="button" title="Xuất chat Markdown">↓</button>
            <button id="themeToggleBtn" class="icon-btn" type="button" title="Đổi sáng/tối">☾</button>
            <button id="clearBtn" class="icon-btn danger-icon" type="button" title="Xóa nội dung chat hiện tại">×</button>
          </div>
        </header>

        <section id="statusPanel" class="status-panel" hidden></section>
        <section id="chat" class="chat"></section>
        <div class="chat-jump-nav" aria-label="Điều hướng câu hỏi và câu trả lời">
          <button id="jumpPrevBtn" type="button" title="Nhảy lên câu hỏi/câu trả lời trước" aria-label="Nhảy lên câu hỏi/câu trả lời trước">↑</button>
          <button id="jumpNextBtn" type="button" title="Nhảy xuống câu hỏi/câu trả lời tiếp theo" aria-label="Nhảy xuống câu hỏi/câu trả lời tiếp theo">↓</button>
        </div>
        <button id="scrollBottomBtn" class="scroll-bottom-btn" type="button" title="Nhảy xuống cuối chat" aria-label="Nhảy xuống cuối chat">↓</button>

        <footer class="composer">
          <div class="composer-head">
            <div class="composer-tools">
              <button id="quickActionsToggle" class="library-toggle" type="button">Thư viện prompt</button>
            </div>
            <div class="session-metrics">
              <span id="messageCount">0 tin nhắn</span>
              <span id="activeModeLabel">Nhanh</span>
            </div>
            <div id="replyStatus" class="reply-status" hidden>Đang trả lời...</div>
            <button id="retryLastBtn" class="retry-last-btn" type="button" hidden>Gửi lại lỗi</button>
          </div>
          <div id="quickActions" class="quick-actions collapsed">
            <div class="quick-group">
              <span class="quick-group-title">Build Product</span>
              <button type="button" data-module="true" data-prompt="Analyze PLR File / Folder: Read this PLR/source note like a license-aware product strategist. Output: summary, niche, useful parts, parts to remove, license/risk level, rebrand recommendation, asset gaps, product kit angle, and final USE / USE ONLY AS RESEARCH / SKIP decision. Source or folder note: [paste here]">Analyze PLR</button>
              <button type="button" data-module="true" data-prompt="Product Idea Scoring: Score this idea for Demand, Buyer Pain, AI Replace Risk, Workflow Value, WarriorPlus Fit, Rebrand Potential, Backend Potential, SaaS Potential, Risk, and final decision NEN LAM / CHUA NEN LAM / BO QUA. Also explain what must be added so it is not raw AI content. Idea: [paste idea here]">Idea Score</button>
              <button type="button" data-module="true" data-prompt="Upgrade Raw Content Into Product Kit: Convert this raw AI/PLR content into a sellable implementation kit. Include workflow, use cases, examples, checklist, customization prompts, planner/sheet, compliance note, file structure, pricing, bump/OTO, and why buyers pay instead of asking AI. Content: [paste here]">Upgrade Kit</button>
              <button type="button" data-module="true" data-prompt="Create Product Assets: Build a file-by-file product package. Output exact filenames, purpose, required contents, examples to include, quality checks, and build order. Product: [product name]">Product Assets</button>
              <button type="button" data-module="true" data-prompt="/full_launch_pack AI Email Campaign Kit">Full Launch Pack</button>
            </div>
            <div class="quick-group">
              <span class="quick-group-title">Launch Assets</span>
              <button type="button" data-module="true" data-prompt="Build Offer Angle: Turn this idea into a clear offer. Output buyer, pain, safe promise, mechanism, unique angle, deliverables, proof substitutes, and why AI alone is not enough. Product: [product name]">Offer Angle</button>
              <button type="button" data-module="true" data-prompt="Write Sales Page: Write a complete WarriorPlus-friendly sales page with headline, subheadline, problem, why raw AI/PLR is not enough, solution, what is inside, how it works, bonuses, who it is for/not for, price framing, FAQ, compliance-safe risk reversal, CTA, and the objection 'Can I just ask AI?'. Product: [product name]">Sales Page</button>
              <button type="button" data-module="true" data-prompt="Create Funnel Plan: Build FE, order bump, OTO1, OTO2, downsell, recurring/backend if useful, commission plan, launch checklist, and explain why each upsell sells speed/depth/license instead of more raw AI text. Product: [product name]">Funnel Plan</button>
              <button type="button" data-module="true" data-prompt="Build WarriorPlus Listing: Create Product Title, Short Description, Long Description, Category, Tags, Price, Commission, Refund Policy, Vendor Note, Affiliate Approval Note, Delivery Page Text, and Support Note. Product: [product name]">W+ Listing</button>
              <button type="button" data-module="true" data-prompt="Create Affiliate Swipe Pack: Create 3 email swipes, 3 short promo emails, 5 Facebook posts, 5 X posts, 3 subject-line sets, 1 launch announcement, 1 last chance email, and 10 affiliate bonus ideas. Product: [product name]">Swipe Pack</button>
            </div>
            <div class="quick-group case-brain-group" data-help="Bấm là chạy luôn. Dùng theo thứ tự: 1 kiểm tra kho, 2 index 300 file nếu chưa có dữ liệu, 3 tìm case, 4 rút pattern.">
              <span class="quick-group-title">Case Study Brain</span>
              <button type="button" data-module="true" data-auto-run="true" data-module-id="training_status" data-prompt="/training_status" title="Xem kho case đã index được bao nhiêu file/chunk">1. Kiểm tra kho</button>
              <button type="button" data-module="true" data-auto-run="true" data-module-id="train_case_study_brain" data-prompt="/train_case_study_brain 300" title="Index thử 300 file cũ. Chạy bước này nếu kho chưa có dữ liệu.">2. Index 300</button>
              <button type="button" data-module="true" data-auto-run="true" data-module-id="case_study_patterns" data-prompt="/case_study_patterns AI PLR Prompt Template Packs for KDP Printables kids printable case study sales page funnel JV email swipe" title="Rút công thức sản phẩm, sales page, funnel, JV từ các case tốt">3. Rút pattern</button>
            </div>
            <div class="quick-group ai-print-group" data-help="Agent ngách đã dùng brain SQLite nội bộ; thư mục transcript gốc không còn bắt buộc sau khi index full.">
              <span class="quick-group-title">AI Printables</span>
              <button type="button" data-module="true" data-auto-run="true" data-module-id="ai_print_status" data-prompt="/ai_print_status" title="Xem bộ não transcript ngách AI printable/KDP/Etsy đã index được bao nhiêu">Kho</button>
              <button type="button" data-module="true" data-auto-run="true" data-module-id="ai_print_patterns" data-prompt="/ai_print_patterns AI Etsy Printable Bundle Builder AI Kids Worksheet Factory AI KDP Puzzle Book Launch Kit AI Coloring Page Niche Pack AI Journal Interior System AI Canva Printable Product Kit" title="Rút pattern sản phẩm/ngách từ transcript">Pattern</button>
              <button type="button" data-module="true" data-auto-run="true" data-module-id="ai_print_market" data-prompt="/ai_print_market AI printable Etsy KDP coloring journal worksheet Canva prompt pack sales page bundle kit funnel deliverables price" title="Rút market pattern có evidence từ brain">Market</button>
              <button type="button" data-module="true" data-auto-run="true" data-module-id="ai_print_competitor" data-prompt="/ai_print_competitor AI printable Etsy KDP coloring journal worksheet Canva prompt pack sales page bundle kit funnel deliverables price" title="Tạo competitor/source matrix từ chunks thật">Matrix</button>
              <button type="button" data-module="true" data-auto-run="true" data-module-id="ai_print_gap" data-prompt="/ai_print_gap Lead Magnet Printable Builder For Coaches" title="Tìm offer gap trước khi build ZIP">Gap</button>
              <button type="button" data-module="true" data-auto-run="true" data-deep-module="true" data-module-id="ai_print_deep" data-prompt="/ai_print_deep AI-assisted PLR products + KDP covers + coloring book + journal + poster/social media assets. Hãy chọn ngách ngon nhất, tạo productized pack, FE/bump/OTO, file tree, 7-day build plan. Offer seeds: AI Etsy Printable Bundle Builder, AI Kids Worksheet Factory, AI KDP Puzzle Book Launch Kit, AI Coloring Page Niche Pack, AI Journal Interior System, AI Canva Printable Product Kit." title="Chạy agent ngách ở chế độ chuyên sâu">Chuyên sâu</button>
              <button type="button" data-module="true" data-auto-run="true" data-module-id="ai_print_build" data-prompt="/ai_print_build Lead Magnet Printable Builder For Coaches" title="Tạo file sản phẩm thật, sales page, funnel, JV pack, buyer test và ZIP">Tạo ZIP</button>
            </div>
            <div class="quick-group audit-group" data-help="Chạy theo thứ tự: 1 kiểm tra market, 2 test buyer, 3 audit launch, 4 export.">
              <span class="quick-group-title">Audit & Test</span>
              <button type="button" data-module="true" data-auto-run="true" data-module-id="market_pattern_extract" data-prompt="/market_pattern_extract" title="Rút pattern thị trường từ brain data">1. Market Pattern</button>
              <button type="button" data-module="true" data-auto-run="true" data-module-id="competitor_matrix" data-prompt="/competitor_matrix" title="Tạo bảng so sánh đối thủ từ brain">2. Competitor Matrix</button>
              <button type="button" data-module="true" data-auto-run="true" data-module-id="buyer_test" data-prompt="/buyer_test Lead Magnet Printable Builder For Coaches" title="Agent đóng vai buyer test sản phẩm">3. Buyer Test</button>
              <button type="button" data-module="true" data-auto-run="true" data-module-id="prompt_output_test" data-prompt="/prompt_output_test Lead Magnet Printable Builder For Coaches" title="Test chất lượng prompt trong pack">4. Prompt Test</button>
              <button type="button" data-module="true" data-auto-run="true" data-module-id="ai_replace_risk_v2" data-prompt="/ai_replace_risk Lead Magnet Printable Builder For Coaches" title="Tìm chỗ buyer nghĩ ChatGPT cũng làm được">5. AI Risk</button>
              <button type="button" data-module="true" data-auto-run="true" data-module-id="public_launch_audit" data-prompt="/public_launch_audit Lead Magnet Printable Builder For Coaches" title="Kiểm tra đủ điều kiện launch public chưa">6. Launch Gate</button>
              <button type="button" data-module="true" data-auto-run="true" data-module-id="final_scorecard" data-prompt="/final_scorecard Lead Magnet Printable Builder For Coaches" title="Tổng kết điểm và quyết định launch">7. Final Score</button>
            </div>
          </div>
          <div id="modeSelector" class="mode-selector" aria-label="Chế độ trả lời">
            <button type="button" data-mode="auto" class="active" title="Tự chọn nhanh/sâu theo câu hỏi và file">Auto</button>
            <button type="button" data-mode="fast" title="Nhanh nhất, vẫn có cấu trúc cao cấp">Nhanh</button>
            <button type="button" data-mode="balanced" title="Sâu hơn, tốc độ vừa phải">Cân bằng</button>
            <button type="button" data-mode="deep" title="Phân tích kỹ nhất, chậm hơn">Sâu</button>
          </div>
          <input id="fileInput" class="file-input" type="file" multiple />
          <div class="prompt-nav" aria-label="Điều hướng câu hỏi và câu trả lời">
            <button id="promptJumpPrevBtn" type="button" title="Lên câu hỏi/câu trả lời trước">↑</button>
            <button id="promptJumpNextBtn" type="button" title="Xuống câu hỏi/câu trả lời tiếp theo">↓</button>
          </div>
          <button id="attachBtn" class="attach-btn" type="button" title="Đính kèm file">+</button>
          <textarea id="prompt" rows="1" placeholder="Nhập câu hỏi, dán ảnh, hoặc kéo file vào đây..."></textarea>
          <button id="sendBtn" class="send-btn" title="Gửi">➤</button>
          <div id="attachmentBar" class="attachment-bar"></div>
        </footer>
      </main>
    </div>
    <aside id="artifactPanel" class="artifact-panel" aria-label="Canvas kết quả" hidden>
      <div class="artifact-head">
        <div>
          <div class="artifact-label">Canvas kết quả</div>
          <div id="artifactTitle" class="artifact-title">Nội dung trả lời</div>
        </div>
        <div class="artifact-actions">
          <button id="artifactCopyBtn" class="icon-btn" type="button" title="Copy canvas">⧉</button>
          <button id="artifactDownloadBtn" class="icon-btn" type="button" title="Tải Markdown">↓</button>
          <button id="artifactCloseBtn" class="icon-btn" type="button" title="Đóng canvas">×</button>
        </div>
      </div>
      <div id="artifactBody" class="artifact-body"></div>
    </aside>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/utils/renderFileCard.js?v=1.09.1"></script>
  <script src="/app.js?v=1.10.0"></script>
  </body>
</html>
